services:
  server:
    image: codeberg.org/forgejo/forgejo:14
    container_name: forgejo
    restart: always
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=postgresql:5432
      - FORGEJO__database__NAME=forgejo
      - FORGEJO__database__USER=postgres
      - FORGEJO__database__PASSWD=password

      - FORGEJO__openid__ENABLE_OPENID_SIGNIN=false
      - FORGEJO__openid__ENABLE_OPENID_SIGNUP=false

      - FORGEJO__storage__STORAGE_TYPE=minio
      - FORGEJO__storage__MINIO_ENDPOINT=${ENDPOINT}
      - FORGEJO__storage__MINIO_ACCESS_KEY_ID=${ACCESS_KEY}
      - FORGEJO__storage__MINIO_SECRET_ACCESS_KEY=${SECRET_ACCESS_KEY}
      - FORGEJO__storage__MINIO_BUCKET=space
      - FORGEJO__storage__MINIO_BASE_PATH=forgejo/
      - FORGEJO__storage__MINIO_LOCATION=auto
      - FORGEJO__storage__MINIO_USE_SSL=true
      - FORGEJO__storage__MINIO_NO_CHECK_BUCKET=true

    volumes:
      - data:/data
      - data_localtime:/etc/localtime:ro

    ports:
      - "3000:3000"
      - "222:22"
    
volumes:
  data:
  data_localtime:

networks:
  default:
    external: true
    name: base